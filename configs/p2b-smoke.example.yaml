# Reference config for P2b — smoke run (paper hyperparameters)
# Live config: demo/configs/p2b-smoke.yaml
# See RULES.md for scope locks
seed: 42
model: "Qwen/Qwen3-1.7B"
num_agents: 2
num_train_epochs: 1
reward_func: "code_exec"

model_params:
  enable_thinking: false
  joint_mode: "aligned"
  num_turns: 1
  num_generations: 8                # MAGRPOConfig field
  max_new_tokens: 512               # MAGRPOConfig field
  train_batch_size: 1               # MAGRPOConfig field
  rollout_buffer_size: 8            # MAGRPOConfig field
  agent_learning_rate: 1.0e-6       # paper lr (MAGRPOConfig.agent_learning_rate)
  # kl_coef: not a MAGRPOConfig field in CoMLRL 1.3.8 — deviation documented in GATE_SUMMARY

dataset:
  type: "humaneval"
  split: "test"
  max_problems: 64

checkpoint:
  output_dir: "/workspace/artifacts/P2b/checkpoint"
  save_steps: 999999
