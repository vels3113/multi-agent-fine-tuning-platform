# Reference config for P2b — smoke run (paper hyperparameters)
# Live config: demo/configs/p2b-smoke.yaml
# See RULES.md for scope locks
seed: 42
model: "Qwen/Qwen3-1.7B"
num_agents: 2
num_train_epochs: 1
reward_func: "code_exec"

model_params:
  enable_thinking: false
  joint_mode: "aligned"
  num_turns: 1
  num_generations: 8
  max_new_tokens: 512
  learning_rate: 1.0e-6
  kl_coef: 0.04
  per_device_train_batch_size: 1
  rollout_buffer_size: 8

dataset:
  type: "mbpp"
  split: "train"
  max_problems: 64

checkpoint:
  output_dir: "/workspace/artifacts/P2b/checkpoint"
  save_steps: 999999
