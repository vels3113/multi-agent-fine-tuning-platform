# platform/configs/p3a-instrumentation.example.yaml
# P3a reference config — analytics instrumentation
# Extends p2b-smoke.yaml with W&B + smi polling settings
seed: 42
model: "Qwen/Qwen3-1.7B"
num_agents: 2
num_train_epochs: 1
reward_func: "dummy"        # use "code_exec" for the real D1 run

model_params:
  enable_thinking: false    # R4 — must remain false
  joint_mode: "aligned"
  num_turns: 1
  num_generations: 8
  max_new_tokens: 512
  learning_rate: 1.0e-6
  kl_coef: 0.04
  per_device_train_batch_size: 1
  rollout_buffer_size: 8

dataset:
  type: inline
  prompts:
    - "Write a Python function that adds two numbers:"
    - "Write a Python function that reverses a string:"
    - "Write a Python function that checks if a number is prime:"
    - "Write a Python function that computes the factorial:"

checkpoint:
  output_dir: "/workspace/artifacts/P3a/checkpoint"
  save_steps: 999999        # save once at end for overhead test

watchdog_shm: "magrpo_p3a"

# rocm-smi polling interval (seconds)
smi_poll_interval: 5.0

# W&B configuration — all values read from env vars (WANDB_API_KEY, WANDB_PROJECT, WANDB_ENTITY)
# Override here only if you need to target a different project for this specific run.
wandb:
  project: null             # falls back to WANDB_PROJECT env var
  entity: null              # falls back to WANDB_ENTITY env var
  run_name: null            # auto-generated by W&B
