# Minimal config for kill-and-resume integration testing
seed: 42
model: "Qwen/Qwen3-1.7B"
num_agents: 2
num_train_epochs: 1
reward_func: "dummy"

watchdog_shm: "magrpo_p2c_test"

model_params:
  enable_thinking: false
  joint_mode: "aligned"
  num_turns: 1
  num_generations: 2
  max_new_tokens: 64
  train_batch_size: 1
  rollout_buffer_size: 2
  agent_learning_rate: 1.0e-6

dataset:
  type: inline
  prompts:
    - "Write a Python function that adds two numbers:"
    - "Write a Python function that reverses a string:"
    - "Write a Python function that checks if a number is prime:"
    - "Write a Python function that computes the factorial:"
    - "Write a Python function that sorts a list:"
    - "Write a Python function that finds the maximum:"
    - "Write a Python function that counts vowels:"
    - "Write a Python function that flattens a list:"

checkpoint:
  output_dir: "/tmp/p2c_test_checkpoints"
  save_steps: 4
